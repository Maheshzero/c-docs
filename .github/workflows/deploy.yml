name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # cache omitted to avoid failing when lockfile is missing
      
      - name: Install dependencies
        run: npm install
      
      - name: Build (Minify & Obfuscate)
        run: |
          set -euo pipefail
          mkdir -p dist
          # Minify and mangle JS files with terser (installed by npm)
          npx terser app.js -c -m -o dist/app.min.js || true
          npx terser compiler.js -c -m -o dist/compiler.min.js || true
          npx terser data.js -c -m -o dist/data.min.js || true
          if [ -f docs_content.js ]; then npx terser docs_content.js -c -m -o dist/docs_content.min.js || true; fi
          # copy already-minified libs
          if [ -f marked.min.js ]; then cp marked.min.js dist/; fi
          echo "✅ Inline build complete"
      
      - name: Verify build output
        run: |
          ls -lah dist/
          echo "✅ Build successful"
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy functions/_middleware.js --name oslab --compatibility-date 2026-07-16
        env:
          WRANGLER_CONFIG_DIR: .
