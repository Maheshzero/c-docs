name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      
      - name: Install dependencies
        run: npm install
      
      - name: Build (Copy original assets)
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -f app.js dist/app.js || true
          cp -f compiler.js dist/compiler.js || true
          cp -f data.js dist/data.js || true
          if [ -f docs_content.js ]; then cp -f docs_content.js dist/docs_content.js; fi
          if [ -f marked.min.js ]; then cp -f marked.min.js dist/; fi
          echo "✅ Copied original assets into dist/"
      
      - name: Verify build output
        run: |
          ls -lah dist/
          echo "✅ Build successful"
      
      - name: Install Wrangler v4 and deploy
        run: |
          set -euo pipefail
          npm install --no-save wrangler@4
          npx wrangler deploy --name oslab --compatibility-date 2026-07-16
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_CONFIG_DIR: .
