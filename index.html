<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C Docs — OS Lab Reference</title>
  <meta name="description" content="Interactive C documentation and Linux command-line terminal simulator for Operating Systems lab programs." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Mobile Top Nav -->
  <div class="mobile-nav-top">
    <button id="mobile-menu-btn" class="mobile-btn">☰ Topics</button>
    <span class="mobile-title">C Docs</span>
    <button id="mobile-run-btn" class="mobile-btn">▶ Run</button>
  </div>

  <!-- Sidebar Backdrop -->
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <!-- ============================================================
       MAIN LAYOUT
  ============================================================ -->
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-brand">C Docs</span>
        <span class="sidebar-sub">OS Lab Reference</span>
      </div>
      <nav>
        <ul id="sidebar-menu-list" class="sidebar-menu"></ul>
      </nav>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="content-area view-docs">

      <!-- LEFT: DOCUMENTATION PANEL -->
      <section class="doc-panel" id="doc-panel">
        <div class="doc-header">
          <span id="doc-category" class="doc-category">Category</span>
          <h1 id="doc-title" class="doc-title">Topic Title</h1>
          <p id="doc-description" class="doc-description">Description goes here.</p>
        </div>

        <!-- Mismatch / Warning Alert -->
        <div id="compatibility-alert" class="compat-alert" style="display:none;">
          <span class="alert-icon">⚠</span>
          <span id="warning-text"></span>
        </div>

        <!-- Doc body: deconstruction + explanation + compatibility -->
        <div id="doc-body" class="doc-body"></div>

        <!-- Code Block -->
        <div class="code-block-wrapper">
          <div class="code-block-header">
            <span id="doc-code-filename" class="code-filename">filename.c</span>
            <button id="copy-code-btn" class="copy-btn">Copy</button>
          </div>
          <pre class="code-block"><code id="doc-code-code"></code></pre>
        </div>
      </section>

      <!-- RIGHT: TERMINAL & GEDIT WORKSPACE -->
      <aside class="right-panel">

        <!-- WORKSPACE PANEL -->
        <div class="workspace-panel">
          
          <!-- Workspace Tabs Header -->
          <div class="workspace-tabs-header">
            <button id="workspace-tab-terminal" class="w-tab-btn active">Terminal</button>
            <button id="workspace-tab-gedit" class="w-tab-btn">Gedit Editor</button>
          </div>

          <!-- Tab View 1: Linux Bash Terminal -->
          <div id="view-terminal" class="workspace-view active">
            <div class="terminal-shell">
              <div id="terminal-lines" class="terminal-lines-content">
                <div class="terminal-line">Welcome to Ubuntu 24.04 LTS (GNU/Linux 6.8.0-generic)</div>
                <div class="terminal-line">Type 'help' or check the 'How to Run' tab below to begin.</div>
                <div class="terminal-line"></div>
              </div>
              <div class="terminal-input-line">
                <span class="terminal-prompt">user@uce-lab:~/os_lab$ </span>
                <input id="terminal-input" class="terminal-input cursor-blink" type="text" autocomplete="off" spellcheck="false" />
              </div>
            </div>
          </div>

          <!-- Tab View 2: Gedit Text Editor -->
          <div id="view-gedit" class="workspace-view">
            <div class="gedit-window">
              <div class="gedit-header">
                <span id="gedit-filename-tab" class="gedit-tab active">program.c</span>
                <button id="gedit-save-btn" class="gedit-save-btn">Save</button>
              </div>
              <textarea id="editor-textarea" class="gedit-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
            </div>
          </div>

        </div>

        <!-- Vertical Resize Handle -->
        <div id="tc-resize-handle" class="tc-resize-handle"></div>

        <!-- BOTTOM HELP TABS -->
        <div class="tabs-panel">
          <div class="tabs-header">
            <button id="tab-btn-syntax"    class="tab-btn active">Syntax Reference</button>
            <button id="tab-btn-shortcuts" class="tab-btn">How to Run</button>
          </div>

          <div id="tab-content-syntax" class="tab-content active">
            <p id="syntax-panel-desc" class="tab-intro"></p>
            <div id="syntax-items-list"></div>
          </div>

          <div id="tab-content-shortcuts" class="tab-content">
            <div id="shortcuts-panel-content"></div>
          </div>
        </div>

      </aside>
    </main>

    <!-- Mobile Bottom Nav -->
    <div class="mobile-nav-bottom">
      <button id="mobile-tab-docs" class="mobile-tab-btn active">Documentation</button>
      <button id="mobile-tab-ide" class="mobile-tab-btn">Workspace</button>
    </div>
  </div>

  <!-- ============================================================
       SCRIPTS
  ============================================================ -->
  <script src="data.js"></script>
  <script src="compiler.js"></script>
  <script src="app.js"></script>
</body>
</html>
