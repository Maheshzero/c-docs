<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>os-uce — OS Lab Reference</title>
  <meta name="description" content="Interactive C documentation and Linux terminal simulator for the UCE Operating Systems lab syllabus." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="lib/xterm.css" />
  <script src="lib/xterm.js"></script>
  <script src="lib/xterm-addon-fit.js"></script>
</head>
<body>

  <!-- Mobile Top Nav -->
  <div class="mobile-nav-top">
    <button id="mobile-menu-btn" class="mobile-btn">Topics</button>
    <div class="mobile-title-group">
      <span class="mobile-title">os-uce</span>
      <span id="mobile-active-topic" class="mobile-topic-label">Basic fork()</span>
    </div>
    <button id="mobile-terminal-toggle" class="mobile-btn">Workspace</button>
  </div>

  <!-- Sidebar Backdrop -->
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <div class="app-shell" id="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand-row">
          <div>
            <span class="sidebar-brand">os-uce</span>
            <span class="sidebar-sub">OS Lab Reference</span>
          </div>
          <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle Light/Dark Mode"></button>
        </div>
      </div>
      <nav>
        <ul id="sidebar-menu-list" class="sidebar-menu"></ul>
      </nav>
      <div class="sidebar-footer">
        OS Lab Reference Platform for educational purposes.
      </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="content-area view-docs">

      <!-- LEFT: DOCUMENTATION PANEL -->
      <section class="doc-panel" id="doc-panel">

        <!-- Sticky Header Bar -->
        <div class="doc-header-bar">
          <span id="doc-category" class="doc-category">Category</span>
          <div class="doc-header-actions">
            <button id="floating-code-btn" class="floating-code-btn" title="Jump to Source Code">View Code</button>
            <button id="workspace-toggle-btn" class="workspace-toggle-btn" title="Toggle Editor/Terminal Workspace">Workspace</button>
          </div>
        </div>

        <div id="doc-tab-notes" class="doc-tab-content active">
          <div class="doc-header">
            <h1 id="doc-title" class="doc-title">Topic Title</h1>
            <p id="doc-description" class="doc-description">Description goes here.</p>
          </div>

          <div id="compatibility-alert" class="compat-alert hidden">
            <span class="alert-icon">!</span>
            <span id="warning-text"></span>
          </div>

          <div id="doc-body" class="doc-body doc-md-content">
            <div id="doc-markdown-content">
              <div class="doc-loading">Loading documentation...</div>
            </div>
            
            <!-- Code Block wrapper -->
            <div class="code-block-wrapper" id="doc-code-wrapper">
              <div class="code-block-header">
                <span id="doc-code-filename" class="code-filename">filename.c</span>
                <div class="code-block-actions">
                  <button id="copy-code-btn" class="copy-btn">Copy</button>
                  <button id="compile-trigger-btn" class="compile-trigger-btn">$ Compile &amp; Run</button>
                </div>
              </div>
              <div class="code-block" id="doc-code-container">
                <!-- code rows populated dynamically by JavaScript -->
              </div>
            </div>
          </div>
        </div>

      </section>

      <!-- RIGHT: WORKSPACE PANEL (Gedit & Terminal Tabs) -->
      <aside class="right-panel" id="right-panel">
        <div class="workspace-panel">
          <div class="workspace-tabs-header">
            <div class="ws-tabs-group">
              <button id="workspace-tab-terminal" class="w-tab-btn active">Terminal</button>
              <button id="workspace-tab-gedit" class="w-tab-btn hidden">Gedit Editor <span id="gedit-tab-close" class="tab-close-btn">&times;</span></button>
            </div>
          </div>

          <!-- Terminal View -->
          <div id="view-terminal" class="workspace-view active">
            <div id="terminal-container"></div>
          </div>

          <!-- Gedit View -->
          <div id="view-gedit" class="workspace-view">
            <div class="gedit-window">
              <div class="gedit-header">
                <span id="gedit-filename-tab" class="gedit-tab active">program.c</span>
                <button id="gedit-save-btn" class="gedit-save-btn">Save</button>
              </div>
              <textarea id="editor-textarea" class="gedit-editor" placeholder="// Write your C program here..." spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <!-- Mobile Bottom Nav -->
    <div class="mobile-nav-bottom">
      <button id="mobile-tab-docs" class="mobile-tab-btn active">Notes</button>
      <button id="mobile-tab-ide" class="mobile-tab-btn">Workspace</button>
    </div>
  </div>

  <!-- Compatibility elements for automated tests (clicks are routed to the proper buttons) -->
  <div class="hidden">
    <button id="ws-compile-btn"></button>
    <button id="ws-run-btn"></button>
  </div>

  <script src="marked.min.js"></script>
  <script src="data.min.js"></script>
  <script src="compiler.min.js"></script>
  <script src="app.min.js"></script>
</body>
</html>
